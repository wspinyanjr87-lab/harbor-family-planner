name: Harbor Build Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - meal-planner
      - creator-studio
  workflow_dispatch:

jobs:
  build:
    name: Build Harbor app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          NEXT_PUBLIC_HARBOR_SAMPLE_MODE: "true"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
        run: npm run build
